<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>

    <link rel="icon" href="assets/img/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/img/favicon/favicon.png" sizes="32x32" />
    <link rel="icon" href="assets/img/favicon/favicon.ico" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/overview.css" />
    <link rel="stylesheet" href="styles/no-find-filter.css" />
    <link rel="stylesheet" href="styles/types.css" />
    <link rel="stylesheet" href="styles/loading-spinner.css" />
    <link rel="stylesheet" href="styles/detail-card.css" />
    <link rel="stylesheet" href="styles/nav-detail-card.css" />

    <script src="scripts/eventlistener.js"></script>
    <script src="scripts/template.js"></script>
    <script src="scripts/render.js"></script>
    <script src="script.js"></script>
  </head>
  <body onload="init()">
    <div id="loading-overlay" class="loading-overlay d-none">
      <div class="loading-box">
        <div class="pokeball-spinner"></div>
        <h2>Loading Pokédex Data...</h2>
        <p>Please wait a moment.</p>
      </div>
    </div>
    <header class="pokedex-header">
      <div>
        <div class="header-logo-wrapper">
          <img src="assets/img/logo.png" alt="Pokeball Logo">
          <h1 class="pokedex-title">Pokédex</h1>
        </div>
        <p class="pokedex-subtitle">Search and filter loaded Pokémon</p>
      </div>

      <div class="controls">
        <div class="search-box">
          <input
            class="search-input"
            type="text"
            placeholder="Search loaded Pokémon..."
          />
        </div>

        <div class="filter-box">
          <div class="type-filter" id="type-filter">
            <button
              id="type-filter-trigger"
              class="type-filter-trigger"
              type="button"
              data-value="all"
            >
              <span class="type-filter-label">All Loaded Types</span>
              <span class="type-filter-arrow">⌄</span>
            </button>

            <div id="type-filter-menu" class="type-filter-menu d-none"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="content">
      <section id="search-status"></section>
      <section id="pokemon-overview-container" class="pokemon-cards-wrapper"></section>
      <button id="next-btn" class="load-more-btn">Load next Pokémon</button>
    </main>
    <div id="pokemon-overlay" class="overlay d-none" onclick="closeOverlay()">
      <div class="overlay-content" onclick="event.stopPropagation()">
        <div id="overlay-body"></div>
      </div>
    </div>
  </body>
</html>
