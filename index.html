<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/overview.css" />
    <link rel="stylesheet" href="styles/cards.css" />
    <link rel="stylesheet" href="styles/types.css" />
    <link rel="stylesheet" href="styles/loading-spinner.css" />
    <link rel="stylesheet" href="styles/detail-card.css" />

    <script src="scripts/template.js"></script>
    <script src="script.js"></script>
  </head>
  <body onload="init()">
    <header class="pokedex-header">
      <div>
        <h1 class="pokedex-title">Pokédex</h1>
        <p class="pokedex-subtitle">Find your favorite Pokémon</p>
      </div>

      <div class="controls">
        <div class="search-box">
          <input
            class="search-input"
            type="text"
            placeholder="Search for Pokémon..."
          />
        </div>

        <div class="filter-box">
          <select class="filter-select">
            <option>All Pokémon Types</option>
            <option>Fire</option>
            <option>Water</option>
            <option>Grass</option>
            <option>Electric</option>
          </select>
        </div>
      </div>
    </header>
    <main class="content">
      <section
        id="pokemon-names-container"
        class="pokemon-cards-wrapper"
      ></section>
      <button id="next-btn" class="load-more-btn">Lade nächtste Pokemon</button>
    </main>
    <div id="pokemon-overlay" class="overlay d-none" onclick="closeOverlay()">
      <div class="overlay-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeOverlay()">✕</button>
        <div id="overlay-body"></div>
      </div>
    </div>
  </body>
</html>
